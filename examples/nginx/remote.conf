# orcai-mcp — Remote HTTPS deployment
# Place at: /etc/nginx/sites-available/orcai-mcp
# Enable: ln -s /etc/nginx/sites-available/orcai-mcp /etc/nginx/sites-enabled/
# Cert:   certbot certonly --webroot -w /var/www/html -d mcp.yourserver.com
#
# Required .env settings when using this config:
#   MCP_ALLOWED_HOSTS=mcp.yourserver.com   ← must match server_name below
#   MCP_AUTH_DISABLED=true                 ← auth handled by nginx IP allowlist

# Rate limiting zone — applied to /mcp endpoint only
limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=30r/m;

server {
    listen 80;
    server_name mcp.yourserver.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.yourserver.com;

    ssl_certificate     /etc/letsencrypt/live/mcp.yourserver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.yourserver.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # MCP endpoint — rate-limited, long-running, streaming
    location /mcp {
        # Allow your own IPs + Anthropic's published outbound CIDR (used by Claude Code / Claude.ai).
        # Verify this range is current before deploying:
        # https://platform.claude.com/docs/en/api/ip-addresses
        allow <your-ip>;
        allow 160.79.104.0/21;  # Anthropic outbound — re-check docs if Claude requests fail
        deny all;

        limit_req zone=mcp_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;

        # Required for SSE / Streamable HTTP
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for agent task execution (5 min)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # REST API + UI + health — standard proxy
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
